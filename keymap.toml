"$schema" = "https://yazi-rs.github.io/schemas/keymap.json"

[mgr]
prepend_keymap = [
	# Trash workflow (lf: dd/dr)
	{ on = [ "d", "d" ], run = "remove", desc = "Trash selected files" },
	{ on = [ "d", "r" ], run = "shell --block -- trash-restore", desc = "Restore from trash" },

	# Core ops from lf
	{ on = [ "m", "d" ], run = "create --dir", desc = "Create directory" },
	{ on = [ "m", "f" ], run = "create", desc = "Create file" },

	# Selection behavior
	{ on = "<Space>", run = [ "toggle", "arrow 1" ], desc = "Toggle selection and move down" },

	# Openers from lf
	{ on = "o", run = "shell --orphan -- mimeopen %h", desc = "Open hovered with mimeopen" },
	{ on = "O", run = "shell --block -- mimeopen --ask %h", desc = "Open hovered with mimeopen (ask)" },
	{ on = "<Enter>", run = "open", desc = "Open selected files" },
	{ on = "E", run = "shell --block -- ya pub extract --list %h", desc = "Extract archive" },

	# External integrations
	{ on = "W", run = "shell --orphan -- ${TERMINAL:-xterm}", desc = "Open terminal in CWD" },
	{ on = [ "g", "?" ], run = [ "shell -- ~/.config/yazi/scripts/generate-yazi-cheatsheet.sh", "reveal ~/.config/yazi/yazi-keybind-cheatsheet.png" ], desc = "Generate and preview cheatsheet" },
	{ on = [ "g", "y" ], run = "copy path --hovered", desc = "Copy hovered file path" },
	{ on = [ "g", "n" ], run = "copy dirname --hovered", desc = "Copy hovered dirname" },
	{ on = [ "g", "u" ], run = "shell --block -- ~/.config/yazi/scripts/share-file-link.sh %s", desc = "Upload selected files and copy link(s)" },
	{ on = [ "g", "i" ], run = "shell -- ~/.config/yazi/scripts/copy-file-to-clipboard.sh %h", desc = "Copy hovered file content to clipboard" },
	{ on = [ "g", "I" ], run = "shell --block -- ~/.config/yazi/scripts/copy-images-collage-to-clipboard.sh %s", desc = "Copy selected images as one collage" },
	{ on = [ "g", "M" ], run = "shell --block -- ~/.config/yazi/scripts/copy-images-collage-to-clipboard.sh --preserve %s", desc = "Copy selected images as preserve-aspect collage" },
	{ on = [ "g", "z", "1" ], run = "shell --block -- ~/.config/yazi/scripts/compress-video.sh 1 %s", desc = "Compress videos (light)" },
	{ on = [ "g", "z", "2" ], run = "shell --block -- ~/.config/yazi/scripts/compress-video.sh 2 %s", desc = "Compress videos (balanced)" },
	{ on = [ "g", "z", "3" ], run = "shell --block -- ~/.config/yazi/scripts/compress-video.sh 3 %s", desc = "Compress videos (strong)" },
	{ on = [ "g", "z", "4" ], run = "shell --block -- ~/.config/yazi/scripts/compress-video.sh 4 %s", desc = "Compress videos (tiny 720p)" },
	{ on = [ "g", "z", "5" ], run = "shell --block -- ~/.config/yazi/scripts/compress-video.sh 5 %s", desc = "Compress videos (HEVC)" },

	# LLM workflow (copy for chat)
	{ on = [ "b", "c" ], run = "shell --block -- ~/.config/yazi/scripts/chat-context-pack.sh %s", desc = "Pack selected files for chat context" },
	{ on = [ "b", "C", "1" ], run = "shell --block -- ~/.config/yazi/scripts/chat-context-pack-budget.sh 4 %s", desc = "Pack files (4k token budget)" },
	{ on = [ "b", "C", "2" ], run = "shell --block -- ~/.config/yazi/scripts/chat-context-pack-budget.sh 8 %s", desc = "Pack files (8k token budget)" },
	{ on = [ "b", "C", "3" ], run = "shell --block -- ~/.config/yazi/scripts/chat-context-pack-budget.sh 16 %s", desc = "Pack files (16k token budget)" },

	# Prompt templates (apply to clipboard content)
	{ on = [ "b", "P", "1" ], run = "shell --block -- ~/.config/yazi/scripts/prompt-template.sh debug", desc = "Apply debug template" },
	{ on = [ "b", "P", "2" ], run = "shell --block -- ~/.config/yazi/scripts/prompt-template.sh refactor", desc = "Apply refactor template" },
	{ on = [ "b", "P", "3" ], run = "shell --block -- ~/.config/yazi/scripts/prompt-template.sh explain", desc = "Apply explain template" },
	{ on = [ "b", "P", "4" ], run = "shell --block -- ~/.config/yazi/scripts/prompt-template.sh review", desc = "Apply review template" },

	# PDF operations
	{ on = [ "b", "z" ], run = "shell --block -- ~/.config/yazi/scripts/compress-pdf.sh %s", desc = "Compress PDFs to half size" },
	{ on = [ "b", "S", "1" ], run = "shell --block -- ~/.config/yazi/scripts/split-pdf.sh %h 2", desc = "Split PDF in half (2 chunks)" },
	{ on = [ "b", "S", "2" ], run = "shell --block -- ~/.config/yazi/scripts/split-pdf.sh %h 3", desc = "Split PDF into 3 chunks" },
	{ on = [ "b", "S", "3" ], run = "shell --block -- ~/.config/yazi/scripts/split-pdf.sh %h 4", desc = "Split PDF into 4 chunks" },
	{ on = [ "b", "J" ], run = "shell --block -- ~/.config/yazi/scripts/join-pdf.sh %s", desc = "Join selected PDFs into one file" },
	{ on = [ "b", "r" ], run = "shell --block -- ~/.config/yazi/scripts/rotate-pdf-clockwise.sh %h", desc = "Rotate hovered PDF clockwise" },

	{ on = "Y", run = "copy filename", desc = "Copy filename" },
	{ on = "<C-f>", run = "plugin fzf", desc = "Jump with fzf" },
	{ on = "T", run = "shell --orphan -- ~/.config/yazi/scripts/drag-with-dragon.sh %s", desc = "Drag selected files/dirs" },

	# Rename ergonomics (lf: A/C/I/i/a/B)
	{ on = "A", run = "rename --cursor=end", desc = "Rename at end" },
	{ on = "C", run = "rename --empty=all --cursor=start", desc = "Rename with empty name" },
	{ on = "I", run = "rename --cursor=start", desc = "Rename at start" },
	{ on = "i", run = "rename --cursor=before_ext", desc = "Rename before extension" },
	{ on = "a", run = "rename --cursor=end", desc = "Rename after extension" },
	{ on = "B", run = "bulk_rename", desc = "Bulk rename" },

	# Directory bookmarks (lf: g*)
	{ on = [ "g", "h" ], run = "cd ~", desc = "Go home" },
	{ on = [ "g", "D" ], run = "cd ~/Documents", desc = "Go ~/Documents" },
	{ on = [ "g", "d" ], run = "cd ~/Downloads", desc = "Go ~/Downloads" },
	{ on = [ "g", "p" ], run = "cd ~/Pictures", desc = "Go ~/Pictures" },
	{ on = [ "g", "v" ], run = "cd ~/Videos", desc = "Go ~/Videos" },
	{ on = [ "g", "m" ], run = "cd ~/Music", desc = "Go ~/Music" },
	{ on = [ "g", "w" ], run = "cd ~/Workspace", desc = "Go ~/Workspace" },
	{ on = [ "g", "c" ], run = "cd ~/.config", desc = "Go ~/.config" },
	{ on = [ "g", "t" ], run = "cd ~/.local/share/Trash/files", desc = "Go trash files" },

	# Harpoon-like quick marks
	{ on = [ "g", "a" ], run = "shell -- ~/.config/yazi/scripts/yazi-harpoon.sh add %h", desc = "Harpoon: add hovered path" },
	{ on = [ "g", "l" ], run = "shell --block -- ~/.config/yazi/scripts/yazi-harpoon.sh list", desc = "Harpoon: list marks" },
	{ on = [ "g", "x" ], run = "shell -- ~/.config/yazi/scripts/yazi-harpoon.sh remove %h", desc = "Harpoon: remove hovered mark" },
	{ on = [ "g", "X" ], run = "shell -- ~/.config/yazi/scripts/yazi-harpoon.sh clear", desc = "Harpoon: clear all marks" },
	{ on = [ "g", "0" ], run = "shell --block -- ~/.config/yazi/scripts/yazi-harpoon.sh menu --emit", desc = "Harpoon: menu" },
	{ on = [ "g", "1" ], run = "shell -- ~/.config/yazi/scripts/yazi-harpoon.sh jump 1 --emit", desc = "Harpoon: jump 1" },
	{ on = [ "g", "2" ], run = "shell -- ~/.config/yazi/scripts/yazi-harpoon.sh jump 2 --emit", desc = "Harpoon: jump 2" },
	{ on = [ "g", "3" ], run = "shell -- ~/.config/yazi/scripts/yazi-harpoon.sh jump 3 --emit", desc = "Harpoon: jump 3" },
	{ on = [ "g", "4" ], run = "shell -- ~/.config/yazi/scripts/yazi-harpoon.sh jump 4 --emit", desc = "Harpoon: jump 4" },
	{ on = [ "g", "]" ], run = "shell -- ~/.config/yazi/scripts/yazi-harpoon.sh next --emit", desc = "Harpoon: next" },
	{ on = [ "g", "[" ], run = "shell -- ~/.config/yazi/scripts/yazi-harpoon.sh prev --emit", desc = "Harpoon: prev" },
]
